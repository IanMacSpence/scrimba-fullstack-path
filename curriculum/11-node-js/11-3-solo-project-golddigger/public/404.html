<!doctype html>
<!-- Tells the browser this is an HTML5 document -->
<html lang="en">
<!-- lang="en" helps screen readers and search engines know the page language -->

<head>
    <!-- Character encoding: ensures special characters display correctly -->
    <meta charset="UTF-8">
    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Description shown by search engines in results -->
    <meta name="description" content="GoldDigger - Invest in gold with ease. Get live prices and make informed decisions.">
    <!-- Links the shared stylesheet (same CSS used by index.html) -->
    <link rel="stylesheet" href="index.css">
    <!-- Preconnect hints speed up loading the Google Fonts by opening the connection early -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Loads three fonts from Google Fonts: Poppins, Roboto, and Saira Stencil One -->
    <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&display=swap"
    rel="stylesheet">
    <!-- Tab title shown in the browser -->
    <title>Page Not Found | GoldDigger</title>
</head>

<body>
    <!-- main wraps the visible card in the centre of the page -->
    <main>
        <!-- App logo/title using the stencil font, styled with a gold gradient in CSS -->
        <h1 class="title">GoldDigger</h1>
        <!-- Decorative gold image; alt text is read aloud by screen readers -->
        <img src="gold.png" alt="gold bars and nuggets">
        <!-- Reuses the same bordered box from index.html, but just shows the 404 message -->
        <section class="price-info-container">
            <h2>404 - No gold here!</h2>
        </section>
    </main>
</body>

</html>
