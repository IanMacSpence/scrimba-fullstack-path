<!doctype html>
<!-- Tells the browser this is an HTML5 document -->
<html lang="en">
<!-- lang="en" helps screen readers and search engines know the page language -->

<head>
    <!-- Character encoding: ensures special characters display correctly -->
    <meta charset="UTF-8">
    <!-- Makes the page responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Description shown by search engines in results -->
    <meta name="description" content="GoldDigger - Invest in gold with ease. Get live prices and make informed decisions.">
    <!-- Links the stylesheet that controls all visual styling -->
    <link rel="stylesheet" href="index.css">
    <!-- Preconnect hints speed up loading Google Fonts by opening the connection early -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Loads three fonts from Google Fonts: Poppins, Roboto, and Saira Stencil One -->
    <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Saira+Stencil+One&display=swap"
    rel="stylesheet">
    <!-- Tab title shown in the browser -->
    <title>GoldDigger</title>
</head>

<body>
    <!-- main wraps the visible card centred on the page -->
    <main>

        <h1 class="title">GoldDigger</h1>
        <img src="gold.png" alt="gold bars and nuggets">

        <!-- Live price box: shows the current gold price per troy ounce -->
        <section class="price-info-container">
            <!-- The <span> is updated by JavaScript with the real-time price.
                 aria-live="assertive" means screen readers announce changes immediately -->
            <p>£<span id="price-display" class="price" aria-live="assertive">----.--</span> / Oz*</p>
            <!-- Shows whether the live price feed is connected (🟢) or not.
                 aria-live="polite" means screen readers wait for a pause before announcing -->
            <p id="connection-status" class="status" aria-live="polite">Live Price 🟢</p>
        </section>

        <!-- Investment form: the user types an amount and clicks Invest Now -->
        <form>
            <!-- label is linked to the input via the matching "for" / "id" values -->
            <label for="investment-amount">Amount to invest</label>
            <div class="input-container">
                <!-- Visual £ prefix sitting to the left of the number input -->
                <div class="currency">£</div>
                <!-- Number input: only accepts numeric values; "required" blocks form submission if empty -->
                <input id="investment-amount" type="number" step="0.01" name="investmentAmount" placeholder="100.00" required>
            </div>
            <!-- Submit button; JavaScript handles the click to calculate and show the summary -->
            <button id="invest-btn" class="invest-btn" aria-label="Invest in gold now">Invest Now!</button>
        </form>

        <!-- Modal dialog that pops up after a successful purchase.
             The browser's native <dialog> element handles show/hide via JS (.showModal() / .close()) -->
        <dialog class="outputs" role="dialog" aria-labelledby="dialog-title" aria-describedby="investment-summary" lang="en">
            <h2>Summary</h2>
            <!-- JavaScript fills this paragraph with the real purchase details (ounces bought, amount spent) -->
            <p id="investment-summary">You just bought <span id="dialog-gold-amount">1.3 ounces</span> (ozt) for £<span id="dialog-invest-amount">3000</span>. <br> You will receive documentation shortly.</p>
                <!-- autofocus moves keyboard focus here when the dialog opens so the user can close it straight away -->
                <button id="dialog-ok-btn" aria-label="Close dialog and return to main page" autofocus>OK</button>
        </dialog>

        <!-- Small print explaining the unit of measurement used for the price -->
        <p class="footnote">* 1oz = 1 troy ounce of 24 Carat Gold</p>
    </main>
    <!-- JavaScript module loaded here (at the bottom) so the DOM is ready before the script runs -->
    <script type="module" src="index.js"></script>
</body>
</html>
